{% extends "admin/base.html" %}

{% block content %}
    <section class="form-section">
        <h2>Edición de {{ producto.nombre }}</h2>
        <form action="{{ url_for('main.edit', id=producto.id) }}" method="POST" class="product-form">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" required value="{{ producto.nombre }}">

            <label for="descripcion">Descripción</label>
            <textarea id="descripcion" name="descripcion" required>{{ producto.descripcion }}</textarea>

            <label for="precio">Precio</label>
            <input type="number" id="precio" name="precio" step="0.01" required value="{{ producto.precio }}">

            <label for="stock">Stock</label>
            <input type="number" id="stock" name="stock" value="{{ producto.stock }}" required>

            <label for="imagen">URL de la imagen</label>
            <input type="text" id="imagen" name="imagen" required value="{{ producto.imagen }}">

            <button type="submit">Guardar producto</button>
        </form>
    </section>
{% endblock %}
